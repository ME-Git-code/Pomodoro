<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pomodoro — Pro Timer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold: #d4a853;
  --gold-dim: rgba(212,168,83,0.12);
  --gold-glow: rgba(212,168,83,0.28);
  --green: #5a8f6a;
  --blue: #4a7da8;
  --text: #f5ead8;
  --text-dim: rgba(245,234,216,0.4);
  --text-mid: rgba(245,234,216,0.65);
  --border: rgba(255,245,220,0.07);
  --border2: rgba(255,245,220,0.14);
  --surface: rgba(26,25,21,0.75);
  --surface2: rgba(35,33,25,0.6);
  --mono: 'DM Mono', monospace;
  --serif: 'Playfair Display', serif;
}

html, body {
  width: 100%; min-height: 100vh;
  background: #080705;
  font-family: var(--mono);
  color: var(--text);
  overflow-x: hidden;
}

/* ── Animated Background ── */
.bg {
  position: fixed; inset: 0; z-index: 0;
  background: radial-gradient(ellipse 80% 60% at 50% 0%, #1a1200 0%, #080705 60%);
  overflow: hidden;
}

.bg-grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(212,168,83,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(212,168,83,0.04) 1px, transparent 1px);
  background-size: 48px 48px;
  animation: gridDrift 60s linear infinite;
}
@keyframes gridDrift {
  from { background-position: 0 0; }
  to { background-position: 48px 48px; }
}

.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  animation: orbFloat 20s ease-in-out infinite alternate;
  pointer-events: none;
}
.orb1 {
  width: 520px; height: 520px;
  top: -160px; left: -160px;
  background: rgba(212,168,83,0.06);
  animation-duration: 22s;
}
.orb2 {
  width: 400px; height: 400px;
  bottom: -120px; right: -120px;
  background: rgba(90,143,106,0.05);
  animation-duration: 28s; animation-delay: -10s;
}
.orb3 {
  width: 300px; height: 300px;
  top: 40%; left: 55%;
  background: rgba(74,125,168,0.04);
  animation-duration: 18s; animation-delay: -5s;
}
@keyframes orbFloat {
  from { transform: translate(0, 0) scale(1); }
  to   { transform: translate(40px, 30px) scale(1.1); }
}

.particles {
  position: absolute; inset: 0;
}
.particle {
  position: absolute;
  width: 2px; height: 2px;
  border-radius: 50%;
  background: rgba(212,168,83,0.5);
  animation: particleFall linear infinite;
}
@keyframes particleFall {
  from { transform: translateY(-10px); opacity: 0; }
  10%  { opacity: 1; }
  90%  { opacity: 0.3; }
  to   { transform: translateY(100vh); opacity: 0; }
}

/* ── Layout ── */
.page {
  position: relative; z-index: 1;
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 2rem 1rem;
}

/* ── Card ── */
.card {
  width: 100%; max-width: 460px;
  background: rgba(12,11,8,0.82);
  backdrop-filter: blur(24px) saturate(160%);
  -webkit-backdrop-filter: blur(24px) saturate(160%);
  border: 0.5px solid var(--border2);
  border-radius: 24px;
  padding: 2rem 2rem 1.75rem;
  box-shadow:
    0 0 0 0.5px rgba(212,168,83,0.08) inset,
    0 40px 80px rgba(0,0,0,0.6),
    0 0 60px rgba(212,168,83,0.04);
  animation: cardIn 0.6s cubic-bezier(.16,1,.3,1) both;
}
@keyframes cardIn {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Top bar ── */
.top-bar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 1.6rem;
}
.logo {
  font-family: var(--serif);
  font-size: 14px; color: var(--gold);
  letter-spacing: 0.06em;
}
.session-pill {
  font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--text-dim);
  background: rgba(212,168,83,0.06);
  border: 0.5px solid rgba(212,168,83,0.2);
  border-radius: 20px; padding: 4px 12px;
}

/* ── Mode tabs ── */
.tabs { display: flex; gap: 6px; margin-bottom: 1.75rem; }
.tab {
  flex: 1; padding: 8px 0;
  border: 0.5px solid var(--border); border-radius: 10px;
  background: transparent; font-family: var(--mono);
  font-size: 10px; letter-spacing: 0.09em; text-transform: uppercase;
  color: var(--text-dim); cursor: pointer; transition: all 0.2s;
}
.tab:hover { border-color: var(--border2); color: var(--text-mid); }
.tab.active { background: var(--gold-dim); border-color: var(--gold); color: var(--gold); }
.tab.active-short { background: rgba(90,143,106,0.12); border-color: var(--green); color: var(--green); }
.tab.active-long  { background: rgba(74,125,168,0.12); border-color: var(--blue);  color: var(--blue); }

/* ── Clock ── */
.clock-wrap {
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 1.75rem;
  position: relative;
}
.clock-inner {
  width: 220px; height: 220px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  position: relative;
}
.ring-svg { position: absolute; top: 0; left: 0; }
.time-disp {
  font-size: 54px; font-weight: 300; letter-spacing: -0.03em;
  line-height: 1; color: var(--text);
  text-shadow: 0 0 30px rgba(212,168,83,0.15);
  transition: color 0.4s;
}
.mode-lbl {
  margin-top: 6px; font-size: 10px; letter-spacing: 0.16em;
  text-transform: uppercase; color: var(--text-dim);
}
.pulse-ring {
  position: absolute; inset: -8px;
  border-radius: 50%; border: 1px solid rgba(212,168,83,0.0);
  pointer-events: none;
  transition: border-color 0.3s;
}
.running .pulse-ring {
  animation: pulseRing 2s ease-out infinite;
  border-color: rgba(212,168,83,0.3);
}
@keyframes pulseRing {
  0%   { transform: scale(0.95); opacity: 1; }
  100% { transform: scale(1.08); opacity: 0; }
}

/* ── Controls ── */
.controls {
  display: flex; align-items: center; justify-content: center;
  gap: 16px; margin-bottom: 1.6rem;
}
.btn-icon {
  width: 40px; height: 40px; border-radius: 50%;
  border: 0.5px solid var(--border2); background: var(--surface2);
  color: var(--text-mid); cursor: pointer; font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; backdrop-filter: blur(4px);
}
.btn-icon:hover { border-color: var(--gold); color: var(--gold); transform: scale(1.05); }
.btn-play {
  width: 64px; height: 64px; border-radius: 50%;
  border: 1.5px solid var(--gold); background: var(--gold-dim);
  color: var(--gold); cursor: pointer; font-size: 22px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
  box-shadow: 0 0 24px rgba(212,168,83,0.15);
}
.btn-play:hover { background: var(--gold-glow); box-shadow: 0 0 36px rgba(212,168,83,0.3); }
.btn-play:active { transform: scale(0.94); }

/* ── Dots ── */
.dots { display: flex; gap: 10px; justify-content: center; margin-bottom: 1.6rem; }
.dot {
  width: 8px; height: 8px; border-radius: 50%;
  border: 0.5px solid var(--border2); background: transparent;
  transition: all 0.35s cubic-bezier(.34,1.56,.64,1);
}
.dot.done { background: var(--gold); border-color: var(--gold); transform: scale(1.1); }
.dot.cur  { border-color: var(--gold); box-shadow: 0 0 6px rgba(212,168,83,0.5); }

/* ── Stats ── */
.stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 1.25rem; }
.stat {
  background: rgba(26,25,21,0.7); border: 0.5px solid var(--border);
  border-radius: 12px; padding: 12px 8px; text-align: center;
  backdrop-filter: blur(4px);
}
.stat-v { font-size: 20px; font-weight: 500; color: var(--text); margin-bottom: 3px; }
.stat-l { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim); }

/* ── Divider ── */
.div { height: 0.5px; background: var(--border); margin: 1.1rem 0; }

/* ── Settings ── */
.setting-row {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 9px;
}
.setting-lbl { font-size: 10px; letter-spacing: 0.09em; text-transform: uppercase; color: var(--text-dim); }
.adj { display: flex; gap: 8px; align-items: center; }
.adj-btn {
  width: 26px; height: 26px; border-radius: 7px;
  border: 0.5px solid var(--border2); background: var(--surface2);
  color: var(--text-mid); cursor: pointer; font-size: 13px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.adj-btn:hover { border-color: var(--gold); color: var(--gold); }
.adj-v { font-size: 13px; color: var(--text); min-width: 26px; text-align: center; }

/* ── Bottom ── */
.bottom { display: flex; align-items: center; justify-content: space-between; margin-top: 1.1rem; }
.sound-btn {
  font-size: 10px; letter-spacing: 0.09em; text-transform: uppercase;
  color: var(--text-dim); cursor: pointer; border: none; background: none;
  font-family: var(--mono); display: flex; align-items: center; gap: 6px;
  transition: color 0.2s; padding: 0;
}
.sound-btn:hover { color: var(--text-mid); }
.today-lbl { font-size: 10px; letter-spacing: 0.05em; color: var(--text-dim); }
.today-lbl span { color: var(--gold); }

/* ── Notification toast ── */
.toast {
  position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(10px);
  background: rgba(212,168,83,0.15); border: 0.5px solid rgba(212,168,83,0.4);
  backdrop-filter: blur(12px); border-radius: 12px;
  padding: 10px 20px; font-size: 12px; letter-spacing: 0.06em;
  color: var(--gold); opacity: 0; pointer-events: none;
  transition: all 0.3s cubic-bezier(.34,1.56,.64,1);
  z-index: 100;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- Animated Background -->
<div class="bg">
  <div class="bg-grid"></div>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
  <div class="particles" id="particles"></div>
</div>

<div class="page">
  <div class="card">

    <div class="top-bar">
      <div class="logo">Pomodoro</div>
      <div class="session-pill" id="sessionPill">Sessiya 1 / 4</div>
    </div>

    <div class="tabs" id="tabs">
      <button class="tab active" onclick="setMode('focus')">Fokus</button>
      <button class="tab" onclick="setMode('short')">Qisqa</button>
      <button class="tab" onclick="setMode('long')">Uzun</button>
    </div>

    <div class="clock-wrap" id="clockWrap">
      <div class="clock-inner">
        <div class="pulse-ring" id="pulseRing"></div>
        <svg class="ring-svg" width="220" height="220" viewBox="0 0 220 220" aria-hidden="true">
          <circle cx="110" cy="110" r="100" fill="none" stroke="rgba(255,245,220,0.05)" stroke-width="1.5"/>
          <circle id="ring" cx="110" cy="110" r="100" fill="none"
            stroke="#d4a853" stroke-width="2"
            stroke-dasharray="628.3" stroke-dashoffset="0"
            stroke-linecap="round"
            transform="rotate(-90 110 110)"
            style="transition: stroke-dashoffset 1s linear, stroke 0.4s;"/>
          <!-- tick marks -->
          <g id="tickMarks"></g>
        </svg>
        <div class="time-disp" id="timeDsp">25:00</div>
        <div class="mode-lbl" id="modeLbl">FOKUS VAQTI</div>
      </div>
    </div>

    <div class="controls">
      <button class="btn-icon" onclick="skipBack()" title="Qaytarish" aria-label="Qaytarish">
        <i class="ti ti-player-skip-back" aria-hidden="true"></i>
      </button>
      <button class="btn-play" id="playBtn" onclick="toggleTimer()" aria-label="Boshlash / To'xtatish">
        <i class="ti ti-player-play" id="playIco" aria-hidden="true"></i>
      </button>
      <button class="btn-icon" onclick="skipNext()" title="O'tkazish" aria-label="O'tkazish">
        <i class="ti ti-player-skip-forward" aria-hidden="true"></i>
      </button>
    </div>

    <div class="dots" id="dots"></div>

    <div class="stats">
      <div class="stat"><div class="stat-v" id="stCompleted">0</div><div class="stat-l">Bajarildi</div></div>
      <div class="stat"><div class="stat-v" id="stMinutes">0</div><div class="stat-l">Daqiqa</div></div>
      <div class="stat"><div class="stat-v" id="stStreak">0</div><div class="stat-l">Ketma-ket</div></div>
    </div>

    <div class="div"></div>

    <div class="setting-row">
      <div class="setting-lbl">Fokus (min)</div>
      <div class="adj">
        <button class="adj-btn" onclick="adj('focus',-5)"><i class="ti ti-minus" style="font-size:11px"></i></button>
        <div class="adj-v" id="vFocus">25</div>
        <button class="adj-btn" onclick="adj('focus',5)"><i class="ti ti-plus" style="font-size:11px"></i></button>
      </div>
    </div>
    <div class="setting-row">
      <div class="setting-lbl">Qisqa tanaffus (min)</div>
      <div class="adj">
        <button class="adj-btn" onclick="adj('short',-1)"><i class="ti ti-minus" style="font-size:11px"></i></button>
        <div class="adj-v" id="vShort">5</div>
        <button class="adj-btn" onclick="adj('short',1)"><i class="ti ti-plus" style="font-size:11px"></i></button>
      </div>
    </div>
    <div class="setting-row">
      <div class="setting-lbl">Uzun tanaffus (min)</div>
      <div class="adj">
        <button class="adj-btn" onclick="adj('long',-5)"><i class="ti ti-minus" style="font-size:11px"></i></button>
        <div class="adj-v" id="vLong">15</div>
        <button class="adj-btn" onclick="adj('long',5)"><i class="ti ti-plus" style="font-size:11px"></i></button>
      </div>
    </div>

    <div class="div"></div>

    <div class="bottom">
      <button class="sound-btn" onclick="toggleSound()" id="soundBtn">
        <i class="ti ti-volume" id="soundIco" aria-hidden="true"></i>
        <span id="soundTxt">Ovoz yoqilgan</span>
      </button>
      <div class="today-lbl">Bugun: <span id="todaySpan">0</span> sessiya</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Audio Engine ──────────────────────────────────────────────
let audioCtx = null;
let soundOn = true;
let tickNode = null;
let tickGain = null;

function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function startTick() {
  if (!soundOn) return;
  stopTick();
  const ctx = getCtx();
  // Metronome-style tick using oscillator + envelope
  function scheduleTick() {
    if (!running) return;
    const ctx = getCtx();
    const osc = ctx.createOscillator();
    const g   = ctx.createGain();
    osc.connect(g); g.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.value = 1200;
    g.gain.setValueAtTime(0, ctx.currentTime);
    g.gain.linearRampToValueAtTime(0.04, ctx.currentTime + 0.003);
    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.06);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.07);
    tickTimer = setTimeout(scheduleTick, 1000);
  }
  scheduleTick();
}

let tickTimer = null;
function stopTick() { clearTimeout(tickTimer); }

function ringBell() {
  if (!soundOn) return;
  const ctx = getCtx();
  // Rich bell chord
  [[660, 0.4], [880, 0.25], [1320, 0.15], [1760, 0.08]].forEach(([freq, vol]) => {
    const osc = ctx.createOscillator();
    const g   = ctx.createGain();
    osc.connect(g); g.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.value = freq;
    g.gain.setValueAtTime(vol, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 2.5);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 2.6);
  });
  // Second ring after 0.5s
  setTimeout(() => {
    if (!soundOn) return;
    [[660,0.3],[1320,0.12]].forEach(([freq,vol]) => {
      const ctx2 = getCtx();
      const osc = ctx2.createOscillator();
      const g   = ctx2.createGain();
      osc.connect(g); g.connect(ctx2.destination);
      osc.type = 'sine'; osc.frequency.value = freq;
      g.gain.setValueAtTime(vol, ctx2.currentTime);
      g.gain.exponentialRampToValueAtTime(0.0001, ctx2.currentTime + 1.5);
      osc.start(ctx2.currentTime); osc.stop(ctx2.currentTime + 1.6);
    });
  }, 500);
}

// ── State ────────────────────────────────────────────────────
const CFG = { focus: 25, short: 5, long: 15 };
let mode = 'focus';
let totalSecs = CFG.focus * 60;
let remaining = totalSecs;
let running = false;
let iv = null;
let sessionInCycle = 0;
let completedToday = 0;
let totalMinutes = 0;
let streak = 0;
const CYCLES = 4;

const MODES = {
  focus: { lbl: 'FOKUS VAQTI',      ring: '#d4a853', tab: 'active' },
  short: { lbl: 'QISQA TANAFFUS',   ring: '#5a8f6a', tab: 'active-short' },
  long:  { lbl: 'UZUN TANAFFUS',    ring: '#4a7da8', tab: 'active-long'  },
};

// ── Tick marks on ring ────────────────────────────────────────
(function buildTicks() {
  const g = document.getElementById('tickMarks');
  for (let i = 0; i < 60; i++) {
    const angle = (i / 60) * 2 * Math.PI - Math.PI / 2;
    const r1 = i % 5 === 0 ? 92 : 95;
    const r2 = 100;
    const x1 = 110 + r1 * Math.cos(angle);
    const y1 = 110 + r1 * Math.sin(angle);
    const x2 = 110 + r2 * Math.cos(angle);
    const y2 = 110 + r2 * Math.sin(angle);
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1', x1); line.setAttribute('y1', y1);
    line.setAttribute('x2', x2); line.setAttribute('y2', y2);
    line.setAttribute('stroke', i % 5 === 0 ? 'rgba(212,168,83,0.25)' : 'rgba(245,234,216,0.06)');
    line.setAttribute('stroke-width', i % 5 === 0 ? '1.5' : '0.8');
    g.appendChild(line);
  }
})();

// ── Particles ────────────────────────────────────────────────
(function spawnParticles() {
  const container = document.getElementById('particles');
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left  = Math.random() * 100 + '%';
    p.style.top   = Math.random() * 100 + '%';
    const dur  = 8 + Math.random() * 20;
    const delay = -Math.random() * 20;
    p.style.animation = `particleFall ${dur}s ${delay}s linear infinite`;
    p.style.opacity   = 0.2 + Math.random() * 0.5;
    container.appendChild(p);
  }
})();

// ── Render ───────────────────────────────────────────────────
function fmt(s) {
  const m = Math.floor(s / 60), sec = s % 60;
  return String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
}

function updateRing() {
  const pct    = remaining / totalSecs;
  const offset = 628.3 * (1 - pct);
  const ring   = document.getElementById('ring');
  ring.style.strokeDashoffset = offset;
  ring.setAttribute('stroke', MODES[mode].ring);
}

function buildDots() {
  const c = document.getElementById('dots');
  c.innerHTML = '';
  for (let i = 0; i < CYCLES; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i < sessionInCycle ? ' done' : i === sessionInCycle ? ' cur' : '');
    c.appendChild(d);
  }
}

function render() {
  document.getElementById('timeDsp').textContent    = fmt(remaining);
  document.getElementById('modeLbl').textContent    = MODES[mode].lbl;
  document.getElementById('sessionPill').textContent = 'Sessiya ' + (sessionInCycle+1) + ' / ' + CYCLES;
  document.getElementById('stCompleted').textContent = completedToday;
  document.getElementById('stMinutes').textContent   = Math.round(totalMinutes);
  document.getElementById('stStreak').textContent    = streak;
  document.getElementById('todaySpan').textContent   = completedToday;
  updateRing();
  buildDots();

  // Pulse ring while running
  document.getElementById('clockWrap').classList.toggle('running', running);

  // Time display color near end
  const disp = document.getElementById('timeDsp');
  if (remaining <= 60 && mode === 'focus') {
    disp.style.color = '#c0564a';
  } else {
    disp.style.color = 'var(--text)';
  }
}

// ── Tab update ───────────────────────────────────────────────
function updateTabs() {
  const btns = document.querySelectorAll('.tab');
  ['focus','short','long'].forEach((m2, i) => {
    btns[i].className = 'tab' + (m2 === mode ? (' ' + MODES[m2].tab) : '');
  });
}

// ── Toast ────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ── Mode ─────────────────────────────────────────────────────
function setMode(m) {
  mode = m;
  stopTimer();
  totalSecs = CFG[m] * 60;
  remaining = totalSecs;
  updateTabs();
  render();
}

function stopTimer() {
  clearInterval(iv); iv = null;
  stopTick();
  running = false;
  document.getElementById('playIco').className = 'ti ti-player-play';
}

// ── Toggle ───────────────────────────────────────────────────
function toggleTimer() {
  if (running) {
    stopTimer();
  } else {
    running = true;
    document.getElementById('playIco').className = 'ti ti-player-pause';
    if (soundOn) startTick();
    iv = setInterval(() => {
      remaining--;
      if (remaining <= 0) {
        onComplete();
      }
      render();
    }, 1000);
  }
  render();
}

function onComplete() {
  stopTimer();
  ringBell();

  if (mode === 'focus') {
    completedToday++;
    totalMinutes += CFG.focus;
    streak++;
    sessionInCycle = (sessionInCycle + 1) % CYCLES;
    if (sessionInCycle === 0) {
      showToast('🎉 4 sessiya tugadi! Uzoq tanaffus vaqti.');
      setTimeout(() => setMode('long'), 400);
    } else {
      showToast('✓ Sessiya tugadi! Qisqa tanaffus oling.');
      setTimeout(() => setMode('short'), 400);
    }
  } else {
    showToast('Tayyor! Yangi fokus sessiyasi.');
    setTimeout(() => setMode('focus'), 400);
  }
}

// ── Skip ─────────────────────────────────────────────────────
function skipBack() {
  stopTimer();
  remaining = totalSecs;
  render();
}

function skipNext() { onComplete(); }

// ── Adjust settings ──────────────────────────────────────────
function adj(type, delta) {
  CFG[type] = Math.max(1, Math.min(90, CFG[type] + delta));
  document.getElementById('v' + type.charAt(0).toUpperCase() + type.slice(1)).textContent = CFG[type];
  if (mode === type) {
    stopTimer();
    totalSecs = CFG[type] * 60;
    remaining = totalSecs;
    render();
  }
}

// ── Sound ────────────────────────────────────────────────────
function toggleSound() {
  soundOn = !soundOn;
  document.getElementById('soundIco').className = soundOn ? 'ti ti-volume' : 'ti ti-volume-off';
  document.getElementById('soundTxt').textContent = soundOn ? 'Ovoz yoqilgan' : "Ovoz o'chirilgan";
  if (!soundOn) stopTick();
  else if (running) startTick();
}

// ── Init ─────────────────────────────────────────────────────
render();
</script>
</body>
</html>
